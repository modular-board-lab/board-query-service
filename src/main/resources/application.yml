server:
  port: 8084

spring:
  application:
    name: board-query-service

services:
  board-service:
    url: ${BOARD_SERVICE_URL:http://localhost:8081}
  file-service:
    url: ${FILE_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
